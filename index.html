<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oregon DMV Practice</title>
<style>
body{font-family:Arial;margin:0;background:#111;color:#fff;text-align:center}
.container{padding:20px}
button{padding:15px;margin:10px;font-size:18px;border:none;border-radius:8px;background:#0a84ff;color:white}
.card{background:#1c1c1e;padding:20px;border-radius:12px;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>Oregon DMV Practice</h1>

<div id="menu">
<button onclick="startQuiz(10)">Quick Practice</button>
<button onclick="startQuiz(35)">Full Test</button>
<button onclick="startQuiz(20,true)">Hard Mode</button>
<button onclick="showStats()">Progress</button>
</div>

<div id="quiz" style="display:none"></div>
<div id="stats" style="display:none"></div>

</div>

<script>
let questions=[
{q:"What does a red traffic light mean?",a:["Stop","Yield","Go","Speed up"],c:0,topic:"signals"},
{q:"What is the speed limit in a school zone?",a:["20 mph","25 mph","15 mph","30 mph"],c:0,topic:"speed"},
{q:"Who has right of way at a 4-way stop?",a:["First to arrive","Biggest vehicle","Fastest","Right turn only"],c:0,topic:"right-of-way"},
{q:"BAC limit for DUII in Oregon?",a:["0.08%","0.10%","0.05%","0.12%"],c:0,topic:"dui"},
{q:"What does a yellow light mean?",a:["Slow down","Speed up","Stop always","Ignore"],c:0,topic:"signals"}
];

let current=0,score=0,quizData=[],hard=false;

function startQuiz(num,h=false){
hard=h;
quizData=[...questions].sort(()=>.5-Math.random()).slice(0,num);
current=0;score=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
showQuestion();
}

function showQuestion(){
let q=quizData[current];
let html="<div class='card'><h2>"+q.q+"</h2>";
q.a.forEach((opt,i)=>{
html+=`<button onclick="answer(${i})">${opt}</button><br>`;
});
html+="</div>";
document.getElementById("quiz").innerHTML=html;
}

function answer(i){
if(i===quizData[current].c)score++;
current++;
if(current<quizData.length)showQuestion();
else finish();
}

function finish(){
let pass=score>=28;
let html=`<div class='card'><h2>Score: ${score}/${quizData.length}</h2>`;
if(quizData.length===35){
html+=pass?"<h3 style='color:lime'>PASS</h3>":"<h3 style='color:red'>FAIL</h3>";
}
html+="<button onclick='location.reload()'>Restart</button></div>";
document.getElementById("quiz").innerHTML=html;

saveStats(score,quizData.length);
}

function saveStats(s,total){
let data=JSON.parse(localStorage.getItem("stats")||"[]");
data.push({score:s,total:total});
localStorage.setItem("stats",JSON.stringify(data));
}

function showStats(){
document.getElementById("menu").style.display="none";
document.getElementById("stats").style.display="block";
let data=JSON.parse(localStorage.getItem("stats")||"[]");
let html="<div class='card'><h2>Progress</h2>";
if(data.length===0)html+="No data yet";
else{
let avg=data.reduce((a,b)=>a+b.score,0)/data.length;
html+=`<p>Tests taken: ${data.length}</p>`;
html+=`<p>Average score: ${avg.toFixed(1)}</p>`;
}
html+="<button onclick='location.reload()'>Back</button></div>";
document.getElementById("stats").innerHTML=html;
}
</script>
</body>
</html>
